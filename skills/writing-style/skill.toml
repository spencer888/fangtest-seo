[skill]
name = "writing-style"
version = "0.2.0"
description = "Русский SEO стиль для статей о резервуарах РГС. Деловой тон с продающим финалом."
runtime = "prompt_only"

[prompt]
context = """
## Правила написания SEO-статей для РезервуарыСтрой

### Тон и стиль
- Деловой и технический в основной части, продающий в финале
- Активный залог: "резервуар хранит нефтепродукты" — не "хранение осуществляется"
- Обращение к читателю: "ваше предприятие", "вы можете заказать"
- Без восклицательных знаков кроме финального CTA
- Без канцелярита: не "является", "осуществляет", "обеспечивает возможность"

### Структура статьи
1. H1 — название + главное ключевое слово (50-60 символов)
2. Вводный абзац — что это и зачем (2-3 предложения)
3. Технические характеристики — список или мини-таблица
4. Применение — конкретные отрасли с примерами
5. Преимущества — 3-4 пункта с обоснованием
6. CTA — "Заказать расчёт стоимости: 8 (800) 250-63-35"

### Ключевые слова
- Вписывать органично, 1-2 раза на 100 слов
- Главное ключевое слово — в H1 и первом абзаце
- Вторичные слова — в заголовках разделов и тексте
- Не повторять одно слово чаще 3 раз подряд

### Технические требования
- Длина: 300-400 слов
- Абзацы: 3-4 предложения
- HTML теги: h1, h2, p, ul, li, strong, div
- ГОСТ и технические данные указывать точно
- Цифры писать цифрами: "50 м³", не "пятьдесят кубических метров"

### CTA блок (всегда в конце статьи)
<div class="cta-block">
  <strong>Заказать резервуар — звоните бесплатно: 8 (800) 250-63-35</strong>
  <p>Наши специалисты подберут оптимальное решение для вашего предприятия.</p>
</div>
"""
