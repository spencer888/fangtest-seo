api_listen = "127.0.0.1:4200"
network_enabled = true

[channels.telegram]
allowed_users = [283500912]
bot_token_env = "TELEGRAM_BOT_TOKEN"
default_agent = "telegram-orchestrator"
poll_interval_secs = 1

[default_model]
api_key_env = "OPENROUTER_API_KEY"
model = "anthropic/claude-3-haiku"
provider = "openrouter"

[exec_policy]
allowed_commands = [
    "curl",
    "bash",
    "sh",
    "echo",
    "cat",
    "ls",
    "mkdir",
    "rm",
    "cp",
    "mv",
    "grep",
    "sed",
    "awk",
    "python3",
    "node",
]
mode = "full"
safe_bins = [
    "/usr/bin/curl",
    "/bin/bash",
    "/bin/sh",
    "/usr/bin/echo",
    "/bin/cat",
    "/bin/ls",
    "/bin/mkdir",
    "/bin/rm",
    "/bin/cp",
    "/bin/mv",
    "/bin/grep",
    "/bin/sed",
    "/usr/bin/awk",
    "/usr/bin/python3",
    "/usr/bin/node",
]

[memory]
decay_rate = 0.05


