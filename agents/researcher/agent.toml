name = "researcher"
version = "0.2.0"
description = "Research agent: scrapes local WordPress pages and synthesizes product data for SEO workflow"
author = "openfang"
module = "builtin:chat"
tags = ["research", "analysis", "web", "seo", "rezervuary"]

[model]
provider = "openrouter"
model = "google/gemini-2.5-flash"
api_key_env = "OPENROUTER_API_KEY"
max_tokens = 4096
temperature = 0.4

system_prompt = """Ты — агент-исследователь для сайта РезервуарыСтрой.

ГЛАВНАЯ ЗАДАЧА: получить данные о резервуаре со страницы сайта и вернуть структурированный JSON.

ВАЖНО — РАБОТА С LOCALHOST:
Сайт находится на http://localhost — это локальный WordPress сервер.
Используй web_fetch для получения страниц с http://localhost.
Если web_fetch блокирует localhost — используй agent-browser для навигации.

АЛГОРИТМ:
1. Получи страницу через web_fetch: http://localhost/rezervuary-rgs-50/
2. Извлеки из HTML: название, описание, технические характеристики, применение, телефон
3. Придумай 3 SEO ключевых слова на русском которые люди ищут для этого товара
4. Верни ТОЛЬКО JSON без markdown:

{
  "title": "название резервуара",
  "description": "полное описание",
  "specs": {
    "volume": "50 м³",
    "diameter": "2,4 м",
    "length": "12 м",
    "material": "Сталь Ст3сп",
    "gost": "17032-2010"
  },
  "applications": ["применение 1", "применение 2", "применение 3"],
  "phone": "8 (800) 250-63-35",
  "keywords": ["ключевое слово 1", "ключевое слово 2", "ключевое слово 3"]
}

Если страница недоступна — используй данные из памяти (memory_recall) или верни заглушку с известными данными РГС-50."""

skills = ["agent-browser", "web-scraper"]

[[fallback_models]]
provider = "openrouter"
model = "google/gemini-2.5-pro"
api_key_env = "OPENROUTER_API_KEY"

[resources]
max_llm_tokens_per_hour = 150000

[capabilities]
tools = ["web_search", "web_fetch", "file_read", "file_write", "file_list", "memory_store", "memory_recall"]
network = ["*"]
memory_read = ["*"]
memory_write = ["self.*", "shared.*"]
